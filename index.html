document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        if (!entry.compressed && entry.mime.indexOf('image/') === 0) {
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' + entry.data;
          return;
        }
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

tica Neue\", \"Helvetica\", \"Inter\", -apple-system, BlinkMacSystemFont, \"Segoe UI\", Arial, sans-serif;\n  --f-body:    \"Helvetica Neue\", \"Helvetica\", \"Inter\", -apple-system, BlinkMacSystemFont, \"Segoe UI\", Arial, sans-serif;\n  --f-mono:    \"Helvetica Neue\", \"Helvetica\", \"Inter\", -apple-system, BlinkMacSystemFont, \"Segoe UI\", Arial, sans-serif;\n\n  --gutter: clamp(1.5rem, 5vw, 5rem);\n  --section-y: clamp(4rem, 7vw, 6rem);\n\n  --ease-out: cubic-bezier(0.22, 1, 0.36, 1);\n  --ease-in-out: cubic-bezier(0.65, 0, 0.35, 1);\n}\n\n*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }\n\nhtml { background: var(--paper); scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }\n\nbody {\n  font-family: var(--f-body);\n  font-weight: 400;\n  font-size: 17px;\n  line-height: 1.55;\n  color: var(--ink);\n  background: var(--paper);\n  overflow-x: clip;\n  letter-spacing: -0.005em;\n  -webkit-font-smoothing: antialiased;\n  -moz-osx-font-smoothing: grayscale;\n}\n\n::selection { background: var(--ink); color: var(--paper); }\n\nimg { display: block; max-width: 100%; height: auto; }\nbutton { font: inherit; cursor: pointer; background: none; border: 0; color: inherit; padding: 0; }\na { color: inherit; text-decoration: none; }\nul, ol { list-style: none; }\n\n/* Visible keyboard focus on the de-styled buttons & links */\n:focus-visible {\n  outline: 2px solid var(--ink);\n  outline-offset: 3px;\n  border-radius: 1px;\n}\n.footer :focus-visible { outline-color: var(--paper); }\n\n/* ── Type primitives ─────────────────────────────────────── */\n/* `.serif` is reserved for editorial moments only — quotes, the hero name,\n   footer CTA, thesis line. Everything else lives in the Helvetica cascade. */\n.serif {\n  font-family: var(--f-display);\n  font-weight: 400;\n  font-variation-settings: \"opsz\" 36;\n}\n.display {\n  font-family: var(--f-display);\n  font-weight: 700;\n  letter-spacing: -0.035em;\n  line-height: 0.94;\n  font-variation-settings: \"opsz\" 144;\n}\n.sans-disp {\n  font-family: var(--f-body);\n  font-weight: 600;\n  letter-spacing: -0.022em;\n  line-height: 1.1;\n}\n\n/* ════════════════════════════════════════════════════════════════\n   TOPBAR\n   ════════════════════════════════════════════════════════════════ */\n.topbar {\n  position: fixed;\n  top: 0; left: 0; right: 0;\n  z-index: 50;\n  display: grid;\n  grid-template-columns: 1fr auto 1fr;\n  align-items: center;\n  padding: 1.1rem var(--gutter);\n  background: color-mix(in oklab, var(--paper) 92%, transparent);\n  backdrop-filter: blur(14px);\n  -webkit-backdrop-filter: blur(14px);\n  border-bottom: 1px solid transparent;\n  transition: border-color 320ms var(--ease-out), background 320ms var(--ease-out);\n}\n.topbar.is-scrolled {\n  border-bottom-color: var(--hairline);\n}\n\n.topbar__name {\n  display: flex;\n  align-items: baseline;\n  gap: 0.5rem;\n  font-size: 0.95rem;\n}\n.topbar__name > span:first-child {\n  font-family: var(--f-body);\n  font-size: 1rem;\n  font-weight: 600;\n  letter-spacing: -0.012em;\n}\n.topbar__sep { color: var(--ink-muted); }\n.topbar__role { color: var(--ink-soft); font-size: 0.86rem; }\n\n.topbar__nav {\n  display: flex;\n  gap: 1.8rem;\n  font-size: 0.82rem;\n  color: var(--ink-soft);\n  letter-spacing: 0.01em;\n}\n.topbar__nav a {\n  position: relative;\n  padding: 0.2rem 0;\n  transition: color 200ms var(--ease-out);\n}\n.topbar__nav a:hover { color: var(--ink); }\n.topbar__nav a::after {\n  content: \"\";\n  position: absolute;\n  left: 0; right: 0; bottom: -2px;\n  height: 1px;\n  background: var(--ink);\n  transform: scaleX(0);\n  transform-origin: left;\n  transition: transform 280ms var(--ease-out);\n}\n.topbar__nav a:hover::after { transform: scaleX(1); }\n.topbar__nav a.is-current { color: var(--ink); }\n.topbar__nav a.is-current::after { transform: scaleX(1); }\n\n@media (max-width: 980px) {\n  .topbar__nav { display: none; }\n  .topbar { grid-template-columns: 1fr auto; }\n}\n\n/* Language toggle */\n.lang-toggle {\n  display: inline-flex;\n  align-items: center;\n  gap: 0.35rem;\n  font-size: 0.78rem;\n  letter-spacing: 0.04em;\n  justify-self: end;\n  color: var(--ink-soft);\n}\n.lang-btn {\n  text-transform: uppercase;\n  transition: color 200ms var(--ease-out);\n  padding: 0.2rem 0.1rem;\n  color: var(--ink-muted);\n}\n.lang-btn:hover { color: var(--ink); }\n.lang-btn.is-active { color: var(--ink); font-weight: 600; }\n.lang-toggle__slash { color: var(--ink-muted); }\n\n/* ════════════════════════════════════════════════════════════════\n   HERO\n   ════════════════════════════════════════════════════════════════ */\n.hero {\n  position: relative;\n  padding: clamp(5.5rem, 9vw, 7rem) var(--gutter) clamp(3rem, 5vw, 4rem);\n  min-height: 70svh;\n  display: flex;\n  flex-direction: column;\n  justify-content: flex-end;\n}\n\n.hero__grid {\n  display: grid;\n  grid-template-columns: 1fr;\n  gap: clamp(2rem, 4vw, 4rem);\n  align-items: end;\n}\n@media (min-width: 980px) {\n  .hero__grid {\n    grid-template-columns: minmax(0, 1.4fr) minmax(0, 1fr);\n    gap: clamp(2rem, 6vw, 6rem);\n  }\n}\n\n.hero__text { display: flex; flex-direction: column; gap: clamp(1rem, 2vw, 1.6rem); }\n\n.eyebrow {\n  font-size: 0.78rem;\n  color: var(--ink-muted);\n  letter-spacing: 0.08em;\n  font-feature-settings: \"tnum\";\n}\n\n.hero__name {\n  font-size: clamp(3rem, 8vw, 8.5rem);\n  font-weight: 700;\n  letter-spacing: -0.045em;\n  line-height: 0.88;\n  font-variation-settings: \"opsz\" 144;\n}\n.hero__name span {\n  display: inline-block;\n  margin-right: 0.06em;\n}\n\n/* JS-gated reveal */\n/* Self-animating: reveal plays on load regardless of JS timing,\n   so the name can never get stuck at opacity 0. */\n.js .reveal {\n  opacity: 0;\n  transform: translateY(28%);\n  will-change: transform, opacity;\n  animation: reveal-up 1.1s var(--ease-out) var(--delay, 0ms) forwards;\n}\n@keyframes reveal-up { to { opacity: 1; transform: translateY(0); } }\n\n.hero__sub { margin-top: 0.4rem; }\n.hero__role {\n  font-family: var(--f-body);\n  font-size: clamp(1.25rem, 2vw, 1.85rem);\n  font-weight: 400;\n  line-height: 1.22;\n  letter-spacing: -0.02em;\n  color: var(--ink);\n}\n.hero__role em {\n  font-style: italic;\n  font-weight: 300;\n  color: var(--ink-soft);\n}\n.hero__where {\n  font-size: 0.95rem;\n  color: var(--ink-soft);\n  margin-top: 0.4rem;\n}\n\n.hero__meta {\n  display: flex;\n  flex-wrap: wrap;\n  gap: 0.6rem 1.6rem;\n  padding-top: clamp(1.5rem, 3vw, 2.4rem);\n  border-top: 1px solid var(--hairline);\n  margin-top: clamp(0.6rem, 1.5vw, 1rem);\n  font-size: 0.88rem;\n  color: var(--ink-soft);\n}\n.hero__meta-item {\n  transition: color 200ms var(--ease-out);\n}\na.hero__meta-item:hover { color: var(--ink); }\n\n.hero__portrait {\n  position: relative;\n  max-width: 460px;\n  margin-left: auto;\n  width: 100%;\n  align-self: end;\n}\n.hero__portrait img {\n  width: 100%;\n  height: auto;\n  aspect-ratio: 457 / 603;\n  object-fit: cover;\n  filter: grayscale(0.18) contrast(1.02);\n  box-shadow: 0 24px 60px -28px rgba(20, 17, 14, 0.28),\n              0 8px 22px -14px rgba(20, 17, 14, 0.18);\n}\n\n/* Tablet — photo a bit smaller, still beside name */\n@media (max-width: 1100px) {\n  .hero__portrait { max-width: 360px; }\n}\n\n/* Below 980px the grid stacks vertically — photo becomes a small accent */\n@media (max-width: 980px) {\n  .hero__portrait { max-width: 300px; margin: 0; }\n}\n\n@media (max-width: 480px) {\n  .hero__portrait { max-width: 240px; }\n}\n\n.hero__cue {\n  display: inline-flex;\n  align-items: center;\n  gap: 0.5rem;\n  margin-top: clamp(1.75rem, 3.5vw, 2.75rem);\n  font-size: 0.78rem;\n  color: var(--ink-muted);\n  letter-spacing: 0.06em;\n  width: fit-content;\n  transition: color 220ms var(--ease-out), transform 220ms var(--ease-out);\n}\n.hero__cue:hover { color: var(--ink); transform: translateY(3px); }\n.hero__cue svg { stroke: currentColor; }\n\n/* ════════════════════════════════════════════════════════════════\n   SECTION SHELL\n   ════════════════════════════════════════════════════════════════ */\n.section {\n  padding: var(--section-y) var(--gutter);\n  border-top: 1px solid var(--hairline);\n  position: relative;\n  scroll-margin-top: 5rem;\n}\n\n.section__head {\n  display: flex;\n  align-items: baseline;\n  gap: 1.4rem;\n  margin-bottom: clamp(1.75rem, 3.5vw, 3rem);\n  padding-bottom: 1.2rem;\n  border-bottom: 1px solid var(--hairline);\n}\n.section__num {\n  font-family: var(--f-mono);\n  font-size: 0.78rem;\n  color: var(--ink-muted);\n  letter-spacing: 0.1em;\n  font-weight: 400;\n}\n.section__label {\n  font-family: var(--f-body);\n  font-size: clamp(1.1rem, 1.6vw, 1.35rem);\n  font-weight: 600;\n  letter-spacing: -0.01em;\n  color: var(--ink);\n  text-transform: none;\n}\n\n/* ════════════════════════════════════════════════════════════════\n   01 · PROFIL\n   ════════════════════════════════════════════════════════════════ */\n.profil {\n  display: grid;\n  grid-template-columns: 1fr;\n  gap: clamp(2.5rem, 5vw, 4.5rem);\n}\n@media (min-width: 880px) {\n  .profil { grid-template-columns: minmax(0, 1.6fr) minmax(0, 1fr); }\n}\n\n.profil__lead {\n  display: flex;\n  flex-direction: column;\n  gap: clamp(1.1rem, 2vw, 1.5rem);\n}\n.profil__lede {\n  font-family: var(--f-body);\n  font-size: clamp(1.6rem, 3vw, 2.5rem);\n  line-height: 1.08;\n  letter-spacing: -0.03em;\n  font-weight: 600;\n  color: var(--ink);\n  text-wrap: balance;\n}\n.profil__para {\n  font-family: var(--f-body);\n  font-size: clamp(1.02rem, 1.35vw, 1.18rem);\n  line-height: 1.6;\n  font-weight: 400;\n  color: var(--ink-soft);\n  max-width: 48ch;\n}\n.profil__para--hook {\n  color: var(--ink);\n  font-weight: 500;\n}\n\n.profil__aside {\n  display: flex;\n  flex-direction: column;\n  gap: clamp(2rem, 4vw, 2.75rem);\n  align-content: start;\n}\n\n.profil__panel-head {\n  font-size: 0.72rem;\n  font-weight: 600;\n  letter-spacing: 0.14em;\n  text-transform: uppercase;\n  color: var(--ink);\n  padding-bottom: 0.85rem;\n  border-bottom: 1px solid var(--ink);\n}\n\n.focus-list { display: flex; flex-direction: column; }\n.focus-list li {\n  position: relative;\n  padding: 0.72rem 0 0.72rem 1.3rem;\n  font-size: 1rem;\n  line-height: 1.35;\n  color: var(--ink);\n  border-bottom: 1px solid var(--hairline);\n}\n.focus-list li:last-child { border-bottom: 0; }\n.focus-list li::before {\n  content: \"\";\n  position: absolute;\n  left: 0;\n  top: 1.02em;\n  width: 6px;\n  height: 6px;\n  background: var(--accent);\n  border-radius: 1px;\n}\n\n.profil__facts { display: flex; flex-direction: column; }\n.profil__fact {\n  display: flex;\n  align-items: baseline;\n  justify-content: space-between;\n  gap: 1rem;\n  padding: 0.6rem 0;\n  border-top: 1px solid var(--hairline);\n  font-size: 0.92rem;\n}\n.profil__fact:first-child { border-top-color: var(--ink); }\n.profil__fact dt {\n  color: var(--ink-muted);\n  letter-spacing: 0.02em;\n}\n.profil__fact dd {\n  color: var(--ink);\n  font-weight: 500;\n  text-align: right;\n}\n\n/* ════════════════════════════════════════════════════════════════\n   02 · ANTRIEB\n   ════════════════════════════════════════════════════════════════ */\n.section--antrieb { background: var(--paper-2); }\n\n.antrieb { max-width: 68rem; }\n\n.antrieb__intro {\n  font-family: var(--f-body);\n  font-size: clamp(1.1rem, 1.7vw, 1.4rem);\n  line-height: 1.45;\n  font-weight: 400;\n  letter-spacing: -0.01em;\n  color: var(--ink-soft);\n  max-width: 46ch;\n  margin-bottom: clamp(1.75rem, 3.5vw, 3rem);\n}\n\n.antrieb__list { display: grid; }\n\n.antrieb__item {\n  display: grid;\n  grid-template-columns: clamp(3rem, 6vw, 5rem) 1fr;\n  align-items: start;\n  gap: clamp(1rem, 3vw, 2.5rem);\n  padding: clamp(2rem, 4vw, 2.9rem) 0;\n  border-top: 1px solid var(--hairline);\n}\n.antrieb__item:first-child { border-top-color: var(--ink); }\n.antrieb__item:last-child { padding-bottom: 0; }\n\n.antrieb__num {\n  font-family: var(--f-body);\n  font-size: clamp(1.7rem, 3vw, 2.4rem);\n  font-weight: 400;\n  line-height: 1;\n  letter-spacing: -0.01em;\n  color: var(--ink-muted);\n  font-feature-settings: \"tnum\";\n}\n\n.antrieb__content { max-width: 58ch; }\n\n.antrieb__lead {\n  font-family: var(--f-body);\n  font-size: clamp(1.3rem, 2.1vw, 1.8rem);\n  font-weight: 600;\n  line-height: 1.18;\n  letter-spacing: -0.022em;\n  color: var(--ink);\n  margin-bottom: 0.7rem;\n  text-wrap: balance;\n}\n\n.antrieb__text {\n  font-family: var(--f-body);\n  font-size: clamp(1rem, 1.3vw, 1.12rem);\n  line-height: 1.6;\n  letter-spacing: -0.005em;\n  font-weight: 400;\n  color: var(--ink-soft);\n  text-wrap: pretty;\n}\n\n/* ════════════════════════════════════════════════════════════════\n   03 · ERFAHRUNG\n   ════════════════════════════════════════════════════════════════ */\n.exp { display: flex; flex-direction: column; }\n\n/* Company groups — one clamp per employer */\n.exp-group { border-bottom: 1px solid var(--hairline); }\n.exp-group:last-child { border-bottom: 0; }\n.exp-group__bar {\n  display: flex;\n  align-items: baseline;\n  justify-content: space-between;\n  gap: 0.5rem 2rem;\n  flex-wrap: wrap;\n  padding-top: clamp(1.8rem, 3.5vw, 2.6rem);\n}\n.exp-group:first-child .exp-group__bar { padding-top: 0; }\n.exp-group__company {\n  font-family: var(--f-body);\n  font-size: clamp(1.05rem, 1.7vw, 1.35rem);\n  font-weight: 600;\n  letter-spacing: -0.01em;\n  color: var(--ink);\n}\n.exp-group__span {\n  font-family: var(--f-mono);\n  font-size: 0.8rem;\n  color: var(--ink-muted);\n  letter-spacing: 0.02em;\n  white-space: nowrap;\n}\n.exp-group .role { border-bottom: 0; }\n.exp-group .role + .role { border-top: 1px solid var(--hairline); }\n.exp-group__bar + .role { padding-top: clamp(1.2rem, 2.5vw, 1.8rem); }\n\n.role {\n  display: grid;\n  grid-template-columns: 1fr;\n  gap: 1rem 3rem;\n  padding: clamp(2.4rem, 5vw, 3.6rem) 0;\n  border-bottom: 1px solid var(--hairline);\n}\n.role:last-child { border-bottom: 0; }\n\n@media (min-width: 880px) {\n  .role { grid-template-columns: 200px 1fr; }\n}\n\n.role__date {\n  display: flex;\n  flex-wrap: wrap;\n  align-items: baseline;\n  gap: 0.4rem;\n  font-family: var(--f-mono);\n  font-size: 0.82rem;\n  color: var(--ink-soft);\n  letter-spacing: 0.02em;\n  white-space: nowrap;\n}\n.role__sep { color: var(--ink-muted); }\n\n.role--current .role__date span:last-child {\n  color: var(--accent);\n  font-weight: 600;\n}\n\n.role__body { max-width: 64ch; }\n\n.role__title {\n  font-family: var(--f-body);\n  font-size: clamp(1.4rem, 2.4vw, 2rem);\n  line-height: 1.14;\n  letter-spacing: -0.025em;\n  font-weight: 600;\n  color: var(--ink);\n  margin-bottom: 0.4rem;\n}\n.role--current .role__title { color: var(--accent); }\n\n.role__badge {\n  display: inline-block;\n  font-family: var(--f-body);\n  font-size: 0.68rem;\n  font-weight: 600;\n  letter-spacing: 0.14em;\n  text-transform: uppercase;\n  color: var(--accent);\n  margin-bottom: 0.65rem;\n}\n\n.role__company {\n  font-size: 0.92rem;\n  color: var(--ink-soft);\n  margin-bottom: 1.2rem;\n}\n\n.role__bullets {\n  display: flex;\n  flex-direction: column;\n  gap: 0.7rem;\n}\n.role__bullets li {\n  position: relative;\n  padding-left: 1.2rem;\n  font-size: 0.98rem;\n  line-height: 1.5;\n  color: var(--ink-soft);\n}\n.role__bullets li::before {\n  content: \"\";\n  position: absolute;\n  top: 0.62em;\n  left: 0;\n  width: 6px;\n  height: 6px;\n  background: var(--accent);\n  border-radius: 1px;\n}\n\n/* Roles are always visible — no fade-in that could hide content */\n\n/* ════════════════════════════════════════════════════════════════\n   04 · KENNTNISSE\n   ════════════════════════════════════════════════════════════════ */\n.skills {\n  display: grid;\n  grid-template-columns: 1fr;\n  gap: clamp(2.6rem, 5vw, 4rem) clamp(2rem, 4vw, 3.5rem);\n}\n@media (min-width: 720px) { .skills { grid-template-columns: 1fr 1fr; } }\n@media (min-width: 1080px) { .skills { grid-template-columns: 1fr 1fr 1fr; } }\n\n.skill-col__head {\n  font-family: var(--f-body);\n  font-size: 0.78rem;\n  font-weight: 600;\n  letter-spacing: 0.14em;\n  text-transform: uppercase;\n  color: var(--ink);\n  padding-bottom: 0.9rem;\n  margin-bottom: 1rem;\n  border-bottom: 1px solid var(--ink);\n}\n\n.skill-list { display: flex; flex-direction: column; }\n.skill {\n  display: flex;\n  align-items: center;\n  justify-content: space-between;\n  gap: 1rem;\n  padding: 0.55rem 0;\n  font-size: 0.93rem;\n  color: var(--ink-soft);\n  border-bottom: 1px solid var(--hairline);\n}\n.skill:last-child { border-bottom: 0; }\n.skill__name { color: var(--ink); }\n.skill__lvl {\n  display: inline-flex;\n  gap: 0.22rem;\n  flex-shrink: 0;\n}\n.skill__lvl i {\n  display: block;\n  width: 14px;\n  height: 6px;\n  background: var(--hairline-2);\n  border-radius: 1px;\n}\n.skill__lvl[data-lvl=\"3\"] i:nth-child(1),\n.skill__lvl[data-lvl=\"3\"] i:nth-child(2),\n.skill__lvl[data-lvl=\"3\"] i:nth-child(3) { background: var(--ink); }\n.skill__lvl[data-lvl=\"2\"] i:nth-child(1),\n.skill__lvl[data-lvl=\"2\"] i:nth-child(2) { background: var(--ink); }\n.skill__lvl[data-lvl=\"1\"] i:nth-child(1) { background: var(--ink); }\n\n.skill__lvl--mini i { width: 10px; height: 4px; }\n\n.skill-legend {\n  display: flex;\n  flex-direction: column;\n  gap: 0.5rem;\n  margin-top: 1.6rem;\n  padding-top: 1.1rem;\n  border-top: 1px solid var(--hairline);\n  font-size: 0.74rem;\n  color: var(--ink-muted);\n  letter-spacing: 0.02em;\n}\n.skill-legend__item {\n  display: inline-flex;\n  align-items: center;\n  gap: 0.55rem;\n}\n\n.languages {\n  margin-top: 2rem;\n  padding-top: 1.3rem;\n  border-top: 1px solid var(--ink);\n}\n.languages__head {\n  font-size: 0.72rem;\n  color: var(--ink-muted);\n  letter-spacing: 0.14em;\n  text-transform: uppercase;\n  margin-bottom: 0.9rem;\n  font-weight: 500;\n}\n.languages__item {\n  display: flex;\n  align-items: baseline;\n  justify-content: space-between;\n  gap: 0.8rem;\n  font-size: 1.02rem;\n  font-weight: 500;\n  padding: 0.4rem 0;\n}\n.languages__lvl {\n  font-size: 0.78rem;\n  color: var(--ink-muted);\n  letter-spacing: 0.02em;\n  font-weight: 400;\n}\n\n/* ════════════════════════════════════════════════════════════════\n   05 · BILDUNG\n   ════════════════════════════════════════════════════════════════ */\n.edu {\n  display: grid;\n  grid-template-columns: 1fr;\n  gap: clamp(2.5rem, 5vw, 4rem);\n  align-items: start;\n}\n@media (min-width: 880px) { .edu { grid-template-columns: 1fr 1fr; } }\n\n.edu-item {\n  display: grid;\n  grid-template-columns: 1fr;\n  gap: 0.6rem;\n  padding-top: 1.4rem;\n  border-top: 1px solid var(--ink);\n}\n\n.edu-item__date {\n  font-family: var(--f-mono);\n  font-size: 0.82rem;\n  color: var(--ink-muted);\n  letter-spacing: 0.04em;\n  margin-bottom: 0.4rem;\n}\n\n.edu-item__title {\n  font-family: var(--f-body);\n  font-size: clamp(1.6rem, 2.8vw, 2.3rem);\n  font-weight: 600;\n  letter-spacing: -0.03em;\n  line-height: 1.1;\n  color: var(--ink);\n}\n.edu-item__sub {\n  font-size: 1.05rem;\n  color: var(--ink);\n  max-width: 36ch;\n  font-weight: 400;\n  margin-top: 0.3rem;\n}\n.edu-item__inst {\n  font-size: 0.92rem;\n  color: var(--ink-soft);\n  margin-top: 0.2rem;\n}\n.edu-item__thesis {\n  margin-top: 1.2rem;\n  font-size: 1.02rem;\n  color: var(--ink-soft);\n  line-height: 1.45;\n  font-variation-settings: \"opsz\" 36;\n  max-width: 44ch;\n}\n.edu-item__thesis-label {\n  font-style: normal;\n  color: var(--ink-muted);\n  font-size: 0.78rem;\n  letter-spacing: 0.08em;\n  text-transform: uppercase;\n  display: block;\n  margin-bottom: 0.3rem;\n  font-family: var(--f-body);\n  font-weight: 500;\n}\n\n/* ════════════════════════════════════════════════════════════════\n   FOOTER\n   ════════════════════════════════════════════════════════════════ */\n.footer {\n  background: var(--ink);\n  color: var(--paper);\n  padding: clamp(3.5rem, 6vw, 5rem) var(--gutter) 2.75rem;\n  border-top: 1px solid var(--ink);\n} , 10vw, 3rem); }\n  .footer__mail { font-size: 1.2rem; }\n  .footer__details { margin-top: 2rem; gap: 1.6rem; }\n}\n\n@media (max-width: 380px) {\n  .hero__name { font-size: 2.6rem; }\n  .role__title { font-size: 1.2rem; }\n  .skill__name { font-size: 0.85rem; }\n}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n  <!-- ─── HEADER ─────────────────────────────────────────── -->\n  <header class=\"topbar\">\n    <div class=\"topbar__name\">\n      <span data-i18n=\"topbar_name\">Christopher Kipp<\u002Fspan>\n      <span class=\"topbar__sep\">·<\u002Fspan>\n      <span class=\"topbar__role\" data-i18n=\"topbar_role\">Lebenslauf<\u002Fspan>\n    <\u002Fdiv>\n\n    <nav class=\"topbar__nav\">\n      <a href=\"#profil\" data-i18n=\"nav_profil\">Profil<\u002Fa>\n      <a href=\"#antrieb\" data-i18n=\"nav_antrieb\">Antrieb<\u002Fa>\n      <a href=\"#erfahrung\" data-i18n=\"nav_exp\">Erfahrung<\u002Fa>\n      <a href=\"#bildung\" data-i18n=\"nav_edu\">Bildung<\u002Fa>\n      <a href=\"#kenntnisse\" data-i18n=\"nav_skills\">Kenntnisse<\u002Fa>\n    <\u002Fnav>\n\n    <div class=\"lang-toggle\" role=\"group\" aria-label=\"Sprache\">\n      <button class=\"lang-btn is-active\" data-lang=\"de\" aria-pressed=\"true\">DE<\u002Fbutton>\n      <span class=\"lang-toggle__slash\" aria-hidden=\"true\">/<\u002Fspan>\n      <button class=\"lang-btn\" data-lang=\"en\" aria-pressed=\"false\">EN<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <main>\n\n    <!-- ─── HERO ─────────────────────────────────────────── -->\n    <section class=\"hero\" id=\"hero\">\n      <div class=\"hero__grid\">\n\n        <div class=\"hero__text\">\n          <p class=\"eyebrow\" data-i18n=\"eyebrow\">Lebenslauf · Stand Juni 2026<\u002Fp>\n\n          <h1 class=\"hero__name display\">\n            <span class=\"reveal\" style=\"--delay:0ms\">Christopher<\u002Fspan>\n            <span class=\"reveal\" style=\"--delay:120ms\">Kipp.<\u002Fspan>\n          <\u002Fh1>\n\n          <div class=\"hero__sub\">\n            <p class=\"hero__role\" data-i18n=\"hero_role\">Senior Projektmanager <em>Tech &amp; AI Enablement<\u002Fem><\u002Fp>\n            <p class=\"hero__where\" data-i18n=\"hero_where\">bei pilot Hamburg · seit April 2023<\u002Fp>\n          <\u002Fdiv>\n\n          <div class=\"hero__meta\">\n            <a href=\"mailto:Christopher.Kipp@gmx.de\" class=\"hero__meta-item\">Christopher.Kipp@gmx.de<\u002Fa>\n            <span class=\"hero__meta-item\">+49 1575 6168802<\u002Fspan>\n            <span class=\"hero__meta-item\" data-i18n=\"hero_loc\">Hamburg, offen für Berlin<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <figure class=\"hero__portrait\">\n          <img src=\"4b2f0037-7558-47a5-b1d5-67a350786e79\" alt=\"Christopher Kipp\" loading=\"eager\" decoding=\"async\">\n        <\u002Ffigure>\n\n      <\u002Fdiv>\n\n      <a href=\"#profil\" class=\"hero__cue\" aria-label=\"Weiter zum Profil\">\n        <span data-i18n=\"hero_cue\">Weiterlesen<\u002Fspan>\n        <svg width=\"14\" height=\"14\" viewBox=\"0 0 14 14\" fill=\"none\" aria-hidden=\"true\">\n          <path d=\"M7 1v12M2 8l5 5 5-5\" stroke=\"currentColor\" stroke-width=\"1.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath>\n        <\u002Fsvg>\n      <\u002Fa>\n    <\u002Fsection>\n\n    <!-- ─── 01 · PROFIL ─────────────────────────────────────────── -->\n    <section class=\"section\" id=\"profil\">\n      <header class=\"section__head\">\n        <span class=\"section__num\">01<\u002Fspan>\n        <h2 class=\"section__label\" data-i18n=\"profil_label\">Profil<\u002Fh2>\n      <\u002Fheader>\n\n      <div class=\"profil\">\n        <div class=\"profil__lead\">\n          <p class=\"profil__lede\" data-i18n=\"profil_lede\">Marketing-Generalist mit Tech-Fokus.<\u002Fp>\n          <p class=\"profil__para\" data-i18n=\"profil_p1\">Fünf Jahre Agentur in Paid Social, Media-Beratung und crossmedialer Planung, zuletzt als Client Lead mit Verantwortung für sieben- bis achtstellige Jahresbudgets und ein fünfköpfiges Team; größter Kunde war die ARD. Seit Anfang 2026 verantworte ich bei pilot die KI-Strategie und das Enablement der Teams und übersetze zwischen Technologie und den Menschen, die damit arbeiten.<\u002Fp>\n          <p class=\"profil__para profil__para--hook\" data-i18n=\"profil_p2\">Reichweite aufzubauen, beherrsche ich. Bei der taz will ich diese Stärke für einen Journalismus einsetzen, der unabhängig bleibt.<\u002Fp>\n        <\u002Fdiv>\n\n        <div class=\"profil__aside\">\n          <div class=\"profil__panel\">\n            <h3 class=\"profil__panel-head\" data-i18n=\"focus_head\">Schwerpunkte<\u002Fh3>\n            <ul class=\"focus-list\">\n              <li data-i18n=\"focus_1\">Paid Social &amp; Performance Marketing<\u002Fli>\n              <li data-i18n=\"focus_2\">Crossmediale Media- &amp; Kampagnenplanung<\u002Fli>\n              <li data-i18n=\"focus_3\">KI-Strategie &amp; Team-Enablement<\u002Fli>\n              <li data-i18n=\"focus_4\">Team-Entwicklung &amp; Wissenstransfer<\u002Fli>\n            <\u002Ful>\n          <\u002Fdiv>\n          <dl class=\"profil__facts\">\n            <div class=\"profil__fact\">\n              <dt data-i18n=\"fact_exp_l\">Erfahrung<\u002Fdt>\n              <dd data-i18n=\"fact_exp_v\">5+ Jahre · 4 Positionen<\u002Fdd>\n            <\u002Fdiv>\n            <div class=\"profil__fact\">\n              <dt data-i18n=\"fact_lang_l\">Sprachen<\u002Fdt>\n              <dd data-i18n=\"fact_lang_v\">Deutsch · Englisch<\u002Fdd>\n            <\u002Fdiv>\n            <div class=\"profil__fact\">\n              <dt data-i18n=\"fact_loc_l\">Standort<\u002Fdt>\n              <dd data-i18n=\"fact_loc_v\">Hamburg · offen für Berlin<\u002Fdd>\n            <\u002Fdiv>\n          <\u002Fdl>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ─── 02 · ANTRIEB ─────────────────────────────────────────── -->\n    <section class=\"section section--antrieb\" id=\"antrieb\">\n      <header class=\"section__head\">\n        <span class=\"section__num\">02<\u002Fspan>\n        <h2 class=\"section__label\" data-i18n=\"antrieb_label\">Antrieb<\u002Fh2>\n      <\u002Fheader>\n\n      <div class=\"antrieb\">\n        <p class=\"antrieb__intro\" data-i18n=\"antrieb_intro\">Warum ich bei der taz arbeiten will.<\u002Fp>\n\n        <ol class=\"antrieb__list\">\n          <li class=\"antrieb__item\">\n            <span class=\"antrieb__num\" aria-hidden=\"true\">01<\u002Fspan>\n            <div class=\"antrieb__content\">\n              <h3 class=\"antrieb__lead\" data-i18n=\"antrieb_1_lead\">Kommunikation mit Haltung<\u002Fh3>\n              <p class=\"antrieb__text\" data-i18n=\"antrieb_1_body\">In der Betreuung der ARD habe ich gelernt, welchen Unterschied es macht, für Inhalte zu werben, die einem öffentlichen Auftrag folgen statt einer reinen Verkaufslogik. Unabhängiger Journalismus ist für mich eine Voraussetzung für eine funktionierende Demokratie. Genau dafür will ich arbeiten.<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fli>\n          <li class=\"antrieb__item\">\n            <span class=\"antrieb__num\" aria-hidden=\"true\">02<\u002Fspan>\n            <div class=\"antrieb__content\">\n              <h3 class=\"antrieb__lead\" data-i18n=\"antrieb_2_lead\">Transformation datengetrieben gestalten<\u002Fh3>\n              <p class=\"antrieb__text\" data-i18n=\"antrieb_2_body\">Verlage und Medienhäuser stehen unter wirtschaftlichem Druck und agieren in einem Feld, das von fortlaufender Transformation geprägt ist. Aus meiner Berufserfahrung weiß ich, wie wichtig eine holistische, datengetriebene Perspektive ist, um in einem agilen Umfeld Schritt zu halten. Diesen Blickwinkel möchte ich bei der taz einbringen.<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fli>\n          <li class=\"antrieb__item\">\n            <span class=\"antrieb__num\" aria-hidden=\"true\">03<\u002Fspan>\n            <div class=\"antrieb__content\">\n
